<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Decision Support System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Decision Support System</h1>
        <p>Find Netflix movies and TV shows tailored to your preferences.</p>
    </header>

    <main>
        <section id="search-section">
            <form id="recommend-form" novalidate>

                <div class="form-group">
                    <label for="type">Content Type <span class="required">*</span></label>
                    <select id="type" name="type" required>
                        <option value="Movie">Movie</option>
                        <option value="TV Show">TV Show</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="genre">Genre <span class="required">*</span></label>
                    <select id="genre" name="genre" required>
                        <option value="">-- Select a genre --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="country">Country <span class="optional">(optional)</span></label>
                    <select id="country" name="country">
                        <option value="">-- Any country --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="release_year">Release Year <span class="optional">(optional)</span></label>
                    <input
                        type="number"
                        id="release_year"
                        name="release_year"
                        placeholder="e.g. 2020"
                        min="1900"
                    >
                    <span id="year-error" class="field-error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="duration">Duration <span class="optional">(optional)</span></label>
                    <select id="duration" name="duration">
                        <option value="">-- Any duration --</option>
                        <option value="Short">Short (&lt; 90 min)</option>
                        <option value="Medium">Medium (90 – 120 min)</option>
                        <option value="Long">Long (&gt; 120 min)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="keyword">Keyword <span class="optional">(optional)</span></label>
                    <input
                        type="text"
                        id="keyword"
                        name="keyword"
                        placeholder="e.g. heist, space, friendship"
                    >
                </div>

                <div class="form-group">
                    <label for="top_k">Number of Results</label>
                    <select id="top_k" name="top_k">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button id="submit-btn" type="submit">Find Movies</button>
                    <div id="loading" hidden aria-label="Loading results">
                        <span class="spinner" aria-hidden="true"></span>
                        <span>Searching…</span>
                    </div>
                </div>

            </form>
        </section>

        <div id="error-area" role="alert" aria-live="assertive" hidden></div>

        <section id="results-section">
            <div id="results-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
